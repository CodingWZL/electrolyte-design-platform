name: Adjust public counter floor

on:
  workflow_dispatch:
    inputs:
      counter:
        description: "country-XX, search-uses, or prediction-uses"
        required: true
        default: "country-CN"
        type: string
      value:
        description: "New absolute minimum (cannot decrease)"
        required: true
        type: number

permissions:
  actions: write
  contents: write

concurrency:
  group: adjust-public-counter-floor
  cancel-in-progress: false

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate and update floor
        run: node tools/set_counter_floor.mjs "${{ inputs.counter }}" "${{ inputs.value }}"
      - name: Synchronize remote counter
        env:
          COUNTER: ${{ inputs.counter }}
          VALUE: ${{ inputs.value }}
        run: |
          curl --fail --silent --show-error --retry 3 --get \
            --data-urlencode "count=$VALUE" \
            "https://api.counterapi.dev/v1/codingwzl-electrolyte-design/$COUNTER/"
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/counter-floors.json
          if git diff --cached --quiet; then
            echo "No change was needed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git commit -m "Set ${{ inputs.counter }} floor to ${{ inputs.value }}"
          git push origin HEAD:main
          echo "Set **${{ inputs.counter }}** floor to **${{ inputs.value }}**. The Pages deployment starts automatically." >> "$GITHUB_STEP_SUMMARY"
      - name: Trigger Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            --data '{"ref":"main"}'
