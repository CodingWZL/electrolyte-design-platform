name: Deploy private analytics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "analytics-worker/**"
      - ".github/workflows/deploy-analytics.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: private-analytics
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate worker
        run: node --check analytics-worker/src/index.js
      - name: Deploy Worker and Durable Object
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          DEPLOY_OUTPUT=$(npx --yes wrangler@4 deploy --config analytics-worker/wrangler.toml)
          printf '%s\n' "$DEPLOY_OUTPUT"
          WORKER_URL=$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^ ]+\.workers\.dev' | tail -1)
          test -n "$WORKER_URL"
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
      - name: Install a fresh private rate-limit salt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          openssl rand -hex 32 | npx --yes wrangler@4 secret put RATE_LIMIT_SALT --config analytics-worker/wrangler.toml
      - name: Verify the deployed service
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: curl --fail --silent --show-error "$WORKER_URL/health"
      - name: Rebuild and deploy the website
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            --data '{"ref":"main"}'
